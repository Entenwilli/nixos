name: Flake update auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  flake-auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'github-actions[bot]'
    steps:
      - name: Enable auto-merge for Flake Input Update PRs
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
